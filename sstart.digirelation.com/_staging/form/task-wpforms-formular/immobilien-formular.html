<!DOCTYPE html>
<html lang="de-AT">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Immobilie verkaufen – Formular</title>
<style>
  :root{
    --teal:#0e8a80; --teal-dark:#0a6b63; --cta:#ff7a18; --cta-dark:#e96c0c;
    --ink:#1f2d2b; --muted:#6b7c79; --line:#e2e9e7; --bg:#f4f7f6; --card:#fff;
    --radius:14px; --shadow:0 8px 30px rgba(14,138,128,.10);
  }
  #irvFunnel *{box-sizing:border-box}
  #irvFunnel{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);line-height:1.5}
  #irvFunnel .demo-banner{background:#fff6e9;border:1px solid #ffd9a8;color:#8a4b00;font-size:13px;text-align:center;padding:8px 14px;border-radius:10px;margin-bottom:16px}
  #irvFunnel .wrap{max-width:680px;margin:0 auto}
  #irvFunnel .progress{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:26px}
  #irvFunnel .progress > i{display:block;height:100%;width:0;background:var(--teal);border-radius:99px;transition:width .35s ease}
  #irvFunnel .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:30px 26px}
  #irvFunnel h1.q{font-size:23px;line-height:1.3;margin:0 0 22px;font-weight:700}
  #irvFunnel .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){#irvFunnel .opts{grid-template-columns:1fr}}
  #irvFunnel .opt{display:flex;align-items:center;gap:12px;border:2px solid var(--line);border-radius:12px;padding:16px;background:#fff;cursor:pointer;font-size:15.5px;font-weight:600;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  #irvFunnel .opt:hover{border-color:var(--teal);background:#f3faf9}
  #irvFunnel .opt.sel{border-color:var(--teal);background:#e9f6f4}
  #irvFunnel .opt .ic{width:34px;height:34px;flex:0 0 34px;display:flex;align-items:center;justify-content:center;color:var(--teal)}
  #irvFunnel .opt .ic svg{width:30px;height:30px}
  #irvFunnel .opt .check{margin-left:auto;width:20px;height:20px;border:2px solid var(--line);border-radius:6px;flex:0 0 20px}
  #irvFunnel .opt.sel .check{background:var(--teal);border-color:var(--teal);position:relative}
  #irvFunnel .opt.sel .check:after{content:"";position:absolute;left:5px;top:1px;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  #irvFunnel .range-box{text-align:center;padding:10px 0 4px}
  #irvFunnel .range-val{font-size:34px;font-weight:800;color:var(--teal);margin:8px 0 18px}
  #irvFunnel input[type=range]{width:100%;accent-color:var(--teal);height:30px}
  #irvFunnel .range-minmax{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:-6px}
  #irvFunnel .field{margin-bottom:16px;text-align:left}
  #irvFunnel .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  #irvFunnel .field input,#irvFunnel .field select{width:100%;padding:13px 14px;border:2px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  #irvFunnel .field input:focus,#irvFunnel .field select:focus{outline:none;border-color:var(--teal)}
  #irvFunnel .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){#irvFunnel .row2{grid-template-columns:1fr}}
  #irvFunnel .legal{font-size:11.5px;color:var(--muted);margin:14px 0 4px;line-height:1.45}
  #irvFunnel .legal a{color:var(--teal)}
  #irvFunnel .btn{display:block;width:100%;border:0;border-radius:11px;background:var(--cta);color:#fff;font-size:17px;font-weight:700;padding:16px;cursor:pointer;margin-top:20px;font-family:inherit}
  #irvFunnel .btn:hover{background:var(--cta-dark)}
  #irvFunnel .btn:disabled{opacity:.6;cursor:not-allowed}
  #irvFunnel .btn .sub{display:block;font-weight:400;font-size:12.5px;opacity:.9;margin-top:2px}
  #irvFunnel .back{background:none;border:0;color:var(--muted);font-size:14px;cursor:pointer;margin-bottom:14px;padding:4px 0;font-family:inherit}
  #irvFunnel .back:hover{color:var(--ink)}
  #irvFunnel .info-note{font-size:13px;color:var(--muted);margin-top:10px;text-align:center}
  #irvFunnel .err{color:#d23; font-size:13px; margin-top:8px}
  #irvFunnel .confirm{text-align:center;padding:14px 0}
  #irvFunnel .confirm .ok{font-size:13px;font-weight:700;color:#0a8a3f;background:#e6f6ec;display:inline-block;padding:7px 16px;border-radius:99px;margin-bottom:18px}
  #irvFunnel .confirm .mailic{width:64px;height:64px;margin:0 auto 16px;color:var(--teal)}
  #irvFunnel .confirm h2{font-size:21px;margin:0 0 18px}
  #irvFunnel .confirm ul{text-align:left;max-width:460px;margin:0 auto 18px;padding-left:0;list-style:none}
  #irvFunnel .confirm li{padding:10px 0 10px 30px;position:relative;border-top:1px solid var(--line);font-size:14.5px}
  #irvFunnel .confirm li:before{content:"";position:absolute;left:2px;top:14px;width:16px;height:16px;background:var(--teal);border-radius:50%}
  #irvFunnel .confirm li:after{content:"";position:absolute;left:7px;top:18px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  #irvFunnel .dump{font-size:12px;color:var(--muted);background:#f4f7f6;border-radius:8px;padding:12px;margin-top:14px;text-align:left;white-space:pre-wrap;word-break:break-word}

  body{margin:0;background:var(--bg);padding:26px 16px 60px}
</style>
</head>

const CONFIRM_ID = '5OIGhULhrosHcPp3szkeFb';
const byId = {}; SLIDES.forEach((s,i)=>{s._i=i; byId[s.id]=s;});
const responses = {};      // slideId -> answer (label / number / array)
let history = [];
let path = [];
let current = SLIDES[0].id;
let lastAnswers = {};
const APPROX_STEPS = 13;

const ICON = {
  house:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>',
  apartment:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="5" y="3" width="14" height="18" rx="1"/><path d="M9 7h2M13 7h2M9 11h2M13 11h2M9 15h2M13 15h2"/></svg>',
  default:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>'
};
function iconFor(v,label){
  if(v==='house'||/haus|familienhaus|reihenhaus/i.test(label))return ICON.house;
  if(v==='apartment'||/wohnung|etage|maison|dachgesch/i.test(label))return ICON.apartment;
  return ICON.default;
}
const $ = id => document.getElementById(id);
const val = id => { const e=$(id); return e ? e.value.trim() : ''; };

function nextOf(slide, answerNext){
  if(answerNext) return answerNext;
  if(slide.topNext) return slide.topNext;
  const n = SLIDES[slide._i + 1];
  return n ? n.id : null;
}
function resolve(id){
  let g=0;
  while(id && byId[id] && ['PhoneValidationWith2Fa','FlowRedirection','ContactSlideExtendedInfo'].includes(byId[id].type) && g<20){
    id = nextOf(byId[id], null); g++;
  }
  return id;
}
function go(id){
  id = resolve(id) || CONFIRM_ID;
  history.push(current); current = id; path.push(id); render();
}
function back(){ if(history.length){ current = history.pop(); path.pop(); render(); } }

function setProgress(){
  const pct = Math.min(95, Math.round(history.length / APPROX_STEPS * 100));
  $('irvBar').style.width = (byId[current].type==='ConfirmBasic' ? 100 : pct) + '%';
}

function render(){
  const s = byId[current];
  let h = history.length ? '<button class="back" onclick="back()">← Zurück</button>' : '';
  switch(s.type){
    case 'QuestionSelectBasic': h+=renderSelect(s); break;
    case 'QuestionRangeBasic':  h+=renderRange(s);  break;
    case 'PostalCodeBasic':     h+=renderPostal(s); break;
    case 'ContactSlideBasicInfo':
    case 'ContactBasic':        h+=renderContact(s);break;
    default:                    h+=renderConfirm(s);
  }
  $('irvCard').innerHTML = h;
  setProgress();
}

function renderSelect(s){
  const multi=!!s.multiple;
  let h='<h1 class="q">'+s.label+'</h1><div class="opts">';
  s.answers.forEach((a,i)=>{
    h+='<button type="button" class="opt" data-i="'+i+'" onclick="pick('+i+','+multi+')">'
     + '<span class="ic">'+iconFor(a.v,a.l)+'</span>'
     + '<span>'+a.l+'</span>'
     + (multi?'<span class="check"></span>':'') + '</button>';
  });
  h+='</div>';
  if(multi) h+='<button type="button" class="btn" onclick="advanceMulti()">Weiter</button>';
  return h;
}
function pick(i, multi){
  const s=byId[current], a=s.answers[i];
  if(multi){ document.querySelectorAll('#irvCard .opt')[i].classList.toggle('sel'); return; }
  if(s.slug) responses[s.id]=a.l;
  go(nextOf(s, a.next));
}
function advanceMulti(){
  const s=byId[current];
  const chosen=[...document.querySelectorAll('#irvCard .opt.sel')].map(b=>s.answers[b.dataset.i].l);
  if(s.slug) responses[s.id]=chosen;
  go(nextOf(s,null));
}

function renderRange(s){
  const min=s.min, max=s.max, init=s.init||min, step=s.step||1, suf=s.suffix||'';
  const maxLbl=(s.maxPrefix||'')+max+suf;
  return '<h1 class="q">'+s.q+'</h1><div class="range-box">'
    +'<div class="range-val"><span id="irvRv">'+init+'</span>'+suf+'</div>'
    +'<input type="range" id="irvRg" min="'+min+'" max="'+max+'" step="'+step+'" value="'+init+'" '
    +'oninput="document.getElementById(\'irvRv\').textContent=this.value">'
    +'<div class="range-minmax"><span>'+min+suf+'</span><span>'+maxLbl+'</span></div></div>'
    +'<button type="button" class="btn" onclick="advanceRange()">Weiter</button>';
}
function advanceRange(){
  const s=byId[current];
  if(s.slug) responses[s.id]=$('irvRg').value;
  go(nextOf(s,null));
}

function renderPostal(s){
  return '<h1 class="q">'+s.headline+'</h1>'
    +'<div class="field"><label>'+(s.placeholder||'Postleitzahl')+'</label>'
    +'<input id="irvPlz" type="text" inputmode="numeric" placeholder="'+(s.placeholder||'PLZ')+'"></div>'
    +(s.info?'<div class="info-note">'+s.info+'</div>':'')
    +'<div class="err" id="irvPlzErr" style="display:none">Bitte Postleitzahl eingeben.</div>'
    +'<button type="button" class="btn" onclick="advancePostal()">Weiter</button>';
}
function advancePostal(){
  const s=byId[current], v=val('irvPlz');
  if(!v){ $('irvPlzErr').style.display='block'; return; }
  responses[s.id]=v;
  go(nextOf(s,null));
}

function renderContact(s){
  return '<h1 class="q">'+s.headline+'</h1><form id="irvContact" onsubmit="submitContact(event)">'
    +'<div class="field"><label>Anrede</label><select id="irvAnrede" required><option value="">Bitte wählen</option><option>Frau</option><option>Herr</option><option>Divers</option></select></div>'
    +'<div class="row2">'
    +'<div class="field"><label>Vorname</label><input id="irvVorname" required type="text"></div>'
    +'<div class="field"><label>Nachname</label><input id="irvNachname" required type="text"></div></div>'
    +'<div class="field"><label>E-Mail-Adresse</label><input id="irvEmail" required type="email" placeholder="name@beispiel.at"></div>'
    +'<div class="field"><label>Telefonnummer</label><input id="irvTelefon" required type="tel" placeholder="+43 ..."></div>'
    +'<div class="legal">Mit dem Klick auf den Button stellen Sie eine Vermittlungsanfrage, akzeptieren die <a href="#">AGB</a> und bestätigen, dass Sie die <a href="#">Datenschutzerklärung</a> zur Kenntnis genommen haben.</div>'
    +'<button class="btn" type="submit" id="irvSubmit">'+(s.button||'Anfrage absenden')+(s.buttonSub?'<span class="sub">'+s.buttonSub+'</span>':'')+'</button>'
    +'<div class="err" id="irvSubmitErr" style="display:none">Übermittlung fehlgeschlagen – bitte erneut versuchen.</div></form>';
}

/* ---- Antworten einsammeln (nur tatsaechlich beantwortete, pfadbasiert) ---- */
function collectAnswers(){
  const out={};
  path.forEach(id=>{
    const s=byId[id];
    if(s && s.slug && responses[id]!=null && responses[id]!=='') out[s.slug]=responses[id];
  });
  out.anrede=val('irvAnrede'); out.vorname=val('irvVorname'); out.nachname=val('irvNachname');
  out.email=val('irvEmail'); out.telefon=val('irvTelefon');
  return out;
}

/* ---- WPForms Bridge ---- */
function hasWPForms(){ return WPF.formId && document.getElementById('wpforms-submit-'+WPF.formId); }
function wpfSet(fieldId, value){
  if(fieldId==null) return;
  const base='wpforms-'+WPF.formId+'-field_'+fieldId;
  const el=document.getElementById(base);
  if(el && (el.tagName==='SELECT'||el.tagName==='INPUT'||el.tagName==='TEXTAREA')){
    el.value=value;
    el.dispatchEvent(new Event('input',{bubbles:true}));
    el.dispatchEvent(new Event('change',{bubbles:true}));
    return;
  }
  const group=document.querySelectorAll('[id^="'+base+'_"]');
  const wanted=Array.isArray(value)?value:[value];
  group.forEach(inp=>{
    const m=wanted.indexOf(inp.value)>-1;
    if(inp.type==='checkbox') inp.checked=m;
    if(inp.type==='radio' && m) inp.checked=true;
    if(m) inp.dispatchEvent(new Event('change',{bubbles:true}));
  });
}
function pushToWPForms(answers){
  Object.keys(WPF.field).forEach(slug=>{
    const v=answers[slug];
    if(v!=null && v!=='' && !(Array.isArray(v)&&!v.length)) wpfSet(WPF.field[slug], v);
  });
  document.getElementById('wpforms-submit-'+WPF.formId).click(); // WPForms validiert + sendet per AJAX
}

function submitContact(e){
  e.preventDefault();
  lastAnswers=collectAnswers();
  if(hasWPForms()){
    $('irvSubmit').disabled=true; $('irvSubmit').textContent='Wird gesendet …';
    pushToWPForms(lastAnswers);   // Bestaetigung erst beim Success-Event (siehe unten)
  } else {
    go(CONFIRM_ID);               // lokale Vorschau / Fallback ohne WPForms
  }
}

/* WPForms-Events (jQuery wird von WPForms geladen) */
if(window.jQuery && WPF.formId){
  jQuery(document).on('wpformsAjaxSubmitSuccess', '#wpforms-form-'+WPF.formId, function(){ go(CONFIRM_ID); });
  jQuery(document).on('wpformsAjaxSubmitFailed',  '#wpforms-form-'+WPF.formId, function(){
    const b=$('irvSubmit'); if(b){ b.disabled=false; b.textContent='Anfrage absenden'; }
    const er=$('irvSubmitErr'); if(er) er.style.display='block';
  });
}

const MAIL='<svg class="mailic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>';
function renderConfirm(s){
  let h='<div class="confirm">';
  if(s.note) h+='<div class="ok">'+s.note+'</div>';
  h+=MAIL+'<h2>'+(s.headline||'Vielen Dank für Ihre Anfrage')+'</h2>';
  if(s.bullets&&s.bullets.length){ h+='<ul>'; s.bullets.forEach(b=>h+='<li>'+b+'</li>'); h+='</ul>'; }
  if(!hasWPForms()){
    h+='<div class="dump"><b>Vorschau-Modus (kein WPForms verbunden).</b> Diese Daten würden übergeben:\n'
      + JSON.stringify(lastAnswers,null,2) + '</div>';
  }
  h+='</div>';
  return h;
}
